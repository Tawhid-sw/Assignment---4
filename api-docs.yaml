openapi: "3.0.0"
info:
  title: Gear & Grit - Gear Rental API
  description: |
    API documentation for the Gear & Grit platform - a gear rental marketplace.
    Users can register as CUSTOMERs or PROVIDERs. Customers can browse gear, create rental orders, and make payments.
    Providers can manage their gear inventory and fulfill orders. Admins can manage users and view all system data.
  version: "1.0.0"
  contact:
    name: API Support

servers:
  - url: http://localhost:3000
    description: Development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. Can be provided as Bearer token in Authorization header, or as an httpOnly cookie named 'accessToken'."
    CookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: "JWT access token stored in httpOnly cookie. Also accepts refreshToken cookie for token refresh."

  schemas:
    # ============================================
    # General API Response Schemas
    # ============================================
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: "Operation successful"
        data:
          nullable: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errorDetails:
          nullable: true
          type: string

    # ============================================
    # Auth Schemas
    # ============================================
    RegisterInput:
      type: object
      required:
        - name
        - email
        - password
        - role
      properties:
        name:
          type: string
          description: User's full name
          example: "John Doe"
        email:
          type: string
          format: email
          description: User's email address
          example: "john@example.com"
        password:
          type: string
          minLength: 6
          description: Password (minimum 6 characters)
          example: "password123"
        role:
          type: string
          enum: [CUSTOMER, PROVIDER]
          description: User role (ADMIN registration is not allowed)
          example: "CUSTOMER"

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "john@example.com"
        password:
          type: string
          example: "password123"

    UpdateProfileInput:
      type: object
      properties:
        name:
          type: string
          description: Updated name
          example: "John Updated"
        avatarUrl:
          type: string
          format: uri
          description: Updated avatar URL
          example: "https://example.com/avatar.jpg"

    AuthUserResponse:
      type: object
      properties:
        id:
          type: string
          example: "clx..."
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          example: "john@example.com"
        role:
          type: string
          example: "CUSTOMER"
        avatarUrl:
          type: string
          nullable: true

    LoginResponseData:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUserResponse"

    # ============================================
    # Category Schemas
    # ============================================
    Category:
      type: object
      properties:
        id:
          type: string
          example: "clx..."
        name:
          type: string
          example: "Camping"
        slug:
          type: string
          example: "camping"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCategoryInput:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          example: "Camping"
        slug:
          type: string
          example: "camping"

    UpdateCategoryInput:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          example: "Camping Premium"
        slug:
          type: string
          example: "camping-premium"

    # ============================================
    # Gear Schemas
    # ============================================
    GearItem:
      type: object
      properties:
        id:
          type: string
          example: "clx..."
        name:
          type: string
          example: "Tent - 4 Person"
        description:
          type: string
          example: "Spacious 4-person tent with rainfly"
        brand:
          type: string
          example: "Coleman"
        pricePerDay:
          type: number
          format: float
          example: 25.00
        stockQuantity:
          type: integer
          example: 10
        isAvailable:
          type: boolean
          example: true
        imageUrl:
          type: string
          nullable: true
          example: "https://example.com/tent.jpg"
        categoryId:
          type: string
          example: "clx..."
        providerId:
          type: string
          example: "clx..."
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateGearInput:
      type: object
      required:
        - name
        - description
        - brand
        - pricePerDay
        - categorySlug
      properties:
        name:
          type: string
          example: "Tent - 4 Person"
        description:
          type: string
          example: "Spacious 4-person tent with rainfly"
        brand:
          type: string
          example: "Coleman"
        pricePerDay:
          type: number
          format: float
          minimum: 0.01
          example: 25.00
        stockQuantity:
          type: integer
          default: 1
          example: 10
        isAvailable:
          type: boolean
          default: true
          example: true
        imageUrl:
          type: string
          format: uri
          example: "https://example.com/tent.jpg"
        categorySlug:
          type: string
          description: "Category slug to associate the gear with"
          example: "camping"

    UpdateGearInput:
      type: object
      properties:
        name:
          type: string
          example: "Tent - 6 Person"
        description:
          type: string
          example: "Spacious 6-person tent"
        brand:
          type: string
          example: "Coleman"
        pricePerDay:
          type: number
          format: float
          minimum: 0.01
          example: 35.00
        stockQuantity:
          type: integer
          example: 5
        isAvailable:
          type: boolean
          example: true
        imageUrl:
          type: string
          format: uri
        categorySlug:
          type: string
          example: "camping"

    # ============================================
    # Rental / Order Schemas
    # ============================================
    RentalItem:
      type: object
      required:
        - gearItemId
        - quantity
      properties:
        gearItemId:
          type: string
          example: "clx..."
        quantity:
          type: integer
          minimum: 1
          example: 2

    CreateRentalInput:
      type: object
      required:
        - startDate
        - endDate
        - items
      properties:
        startDate:
          type: string
          format: date-time
          description: "Rental start date (cannot be in the past)"
          example: "2026-08-01T10:00:00Z"
        endDate:
          type: string
          format: date-time
          description: "Rental end date (must be after startDate)"
          example: "2026-08-05T10:00:00Z"
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RentalItem"

    RentalOrder:
      type: object
      properties:
        id:
          type: string
          example: "clx..."
        customerId:
          type: string
          example: "clx..."
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        totalCost:
          type: number
          format: float
          example: 150.00
        status:
          type: string
          enum: [PLACED, CONFIRMED, PAID, PICKED_UP, RETURNED, CANCELLED]
          example: "PLACED"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            type: object
            properties:
              gearItemId:
                type: string
              quantity:
                type: integer
              gearItem:
                $ref: "#/components/schemas/GearItem"

    UpdateOrderStatusInput:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [CONFIRMED, PAID, PICKED_UP, RETURNED, CANCELLED]
          description: "New order status"
          example: "CONFIRMED"

    # ============================================
    # Payment Schemas
    # ============================================
    CreatePaymentInput:
      type: object
      required:
        - rentalOrderId
      properties:
        rentalOrderId:
          type: string
          description: "ID of the rental order to pay for"
          example: "clx..."

    Payment:
      type: object
      properties:
        id:
          type: string
          example: "clx..."
        rentalOrderId:
          type: string
        customerId:
          type: string
        amount:
          type: number
          format: float
        currency:
          type: string
          example: "usd"
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED, REFUNDED]
        paymentMethod:
          type: string
          enum: [CARD, MOBILE_BANKING, NET_BANKING, OTHER]
        provider:
          type: string
          enum: [STRIPE, SSLCOMMERZ]
        createdAt:
          type: string
          format: date-time

    # ============================================
    # Review Schemas
    # ============================================
    CreateReviewInput:
      type: object
      required:
        - gearItemId
        - rating
      properties:
        gearItemId:
          type: string
          description: "ID of the gear item being reviewed"
          example: "clx..."
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 4
        comment:
          type: string
          example: "Great tent, very spacious!"

    Review:
      type: object
      properties:
        id:
          type: string
        gearItemId:
          type: string
        customerId:
          type: string
        rating:
          type: integer
          example: 4
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ============================================
    # Admin Schemas
    # ============================================
    UpdateUserStatusInput:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
          description: "New user status"
          example: "SUSPENDED"

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [CUSTOMER, PROVIDER, ADMIN]
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

  # ============================================
  # Generic Response Patterns
  # ============================================
  responses:
    SuccessResponse:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized - not logged in or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

paths:
  # ============================================
  # Auth Routes
  # ============================================
  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: |
        Register a new user account as CUSTOMER or PROVIDER.
        ADMIN role cannot be registered through this endpoint.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: |
        Authenticate a user with email and password.
        Sets httpOnly cookies for accessToken and refreshToken.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: User logged in successfully
          headers:
            Set-Cookie:
              schema:
                type: string
                description: "accessToken and refreshToken cookies set"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponseData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: |
        Refresh the access token using the refreshToken cookie.
        Requires valid refreshToken cookie to be present.
      operationId: refreshToken
      responses:
        "200":
          description: Token refreshed successfully
          headers:
            Set-Cookie:
              schema:
                type: string
                description: "New accessToken cookie set"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/profile:
    get:
      tags:
        - Authentication
      summary: Get user profile
      description: Retrieve the profile of the currently authenticated user.
      operationId: getProfile
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/update-profile:
    put:
      tags:
        - Authentication
      summary: Update user profile
      description: Update the name and/or avatar URL of the currently authenticated user.
      operationId: updateProfile
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ============================================
  # Category Routes
  # ============================================
  /api/categories:
    get:
      tags:
        - Categories
      summary: Get all categories
      description: Retrieve a list of all gear categories.
      operationId: getAllCategories
      responses:
        "200":
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Category"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/categories/create-new-category:
    post:
      tags:
        - Categories
      summary: Create a new category
      description: Create a new gear category. ADMIN access required.
      operationId: createCategory
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "201":
          description: Category created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/categories/{id}:
    get:
      tags:
        - Categories
      summary: Get category by ID
      description: Retrieve a single category by its ID.
      operationId: getCategoryById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Category ID
      responses:
        "200":
          description: Category retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/categories/update-category/{id}:
    put:
      tags:
        - Categories
      summary: Update a category
      description: Update an existing category by ID. ADMIN access required.
      operationId: updateCategory
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Category ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryInput"
      responses:
        "200":
          description: Category updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/categories/delete-category/{id}:
    delete:
      tags:
        - Categories
      summary: Delete a category
      description: Delete an existing category by ID. ADMIN access required.
      operationId: deleteCategory
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Category ID
      responses:
        "200":
          description: Category deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ============================================
  # Gear Routes
  # ============================================
  /api/gear:
    get:
      tags:
        - Gear
      summary: Get all gear items
      description: |
        Retrieve a list of all gear items with optional search and filter parameters.
      operationId: getAllGear
      parameters:
        - name: searchTerm
          in: query
          required: false
          schema:
            type: string
          description: "Search term to filter gear by name/description"
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: "Filter by category slug"
        - name: brand
          in: query
          required: false
          schema:
            type: string
          description: "Filter by brand name"
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
            format: float
          description: "Minimum price per day"
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
            format: float
          description: "Maximum price per day"
        - name: available
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: "Filter by availability (true/false string)"
      responses:
        "200":
          description: Gear retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/GearItem"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/gear/{id}:
    get:
      tags:
        - Gear
      summary: Get gear item by ID
      description: Retrieve a single gear item by its ID.
      operationId: getGearById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Gear item ID
      responses:
        "200":
          description: Gear retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GearItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/gear/create-new-gear:
    post:
      tags:
        - Gear
      summary: Create a new gear item
      description: Create a new gear listing. PROVIDER access required.
      operationId: createGear
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGearInput"
      responses:
        "201":
          description: Gear created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GearItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/gear/update-gear/{id}:
    put:
      tags:
        - Gear
      summary: Update a gear item
      description: Update an existing gear item. Only the owning PROVIDER can update.
      operationId: updateGear
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Gear item ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGearInput"
      responses:
        "200":
          description: Gear updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GearItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/gear/delete-gear/{id}:
    delete:
      tags:
        - Gear
      summary: Delete a gear item
