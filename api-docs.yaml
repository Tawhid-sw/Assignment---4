      summary: "Confirm payment (Stripe webhook)"
      description: |
        Stripe webhook endpoint to confirm payment.
        Receives raw JSON body with a Stripe-Signature header for verification.
        This endpoint uses a raw body parser (not JSON parse) for webhook signature verification.
      operationId: confirmPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Stripe webhook event payload
        description: Raw JSON body for Stripe webhook signature verification
      responses:
        "200":
          description: Payment confirmed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        "400":
          description: Webhook signature verification failed
