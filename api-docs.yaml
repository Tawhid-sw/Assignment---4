  /api/rentals/{id}/return:
    patch:
      summary: Return items and leave reviews
      description: |
        Marks a rental order as RETURNED and creates reviews atomically.
        Requirements:
        - Order must be in PICKED_UP status
        - Order must have a COMPLETED payment
        - Customer must submit at least one review
        - Each review must be for a gear item in this order
        - Each gear item can only be reviewed once per customer
        Stock quantities are restored upon successful return.
      tags: [Rentals]
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnAndReviewInput"
      responses:
        "200":
          description: Items returned and reviewed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          order:
                            $ref: "#/components/schemas/RentalOrder"
                          reviews:
                            type: array
                            items:
                              $ref: "#/components/schemas/Review"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
